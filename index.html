<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPro LMS | Portal Pembelajaran</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary-color: #4f46e5; 
            --primary-hover: #4338ca; 
            --bg-color: #f8fafc; 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="app.js"></script>

    <script>
        // --- STATE MANAJEMEN ---
        let state = {
            user: JSON.parse(localStorage.getItem('edupro_student')) || null,
            view: 'login', // Tampilan default
            activeCourse: null
        };

        // --- FUNGSI NAVIGASI ---
        const navigate = (view) => {
            state.view = view;
            renderApp();
        };

        // --- FUNGSI NOTIFIKASI ---
        const showToast = (message) => {
            Swal.fire({
                toast: true, position: 'top-end', icon: 'success',
                title: message, showConfirmButton: false, timer: 3000
            });
        };

        // --- FUNGSI LOGOUT ---
        const logout = () => {
            localStorage.removeItem('edupro_student');
            state.user = null;
            navigate('login');
        };

        // ==========================================
        // TAMPILAN 1: LOGIN (TERHUBUNG SUPABASE)
        // ==========================================
        const renderLogin = () => {
            document.getElementById('app').innerHTML = `
                <div class="min-vh-100 d-flex align-items-center justify-content-center">
                    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold" style="color: var(--primary-color);">EduPro LMS</h3>
                            <p class="text-muted small">Portal Pembelajaran Siswa</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">NISN</label>
                                <input type="text" id="nisn" class="form-control" required placeholder="Masukkan NISN">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="password" class="form-control" required placeholder="Masukkan Password">
                            </div>
                            <button type="submit" id="btnLogin" class="btn btn-primary w-100 mb-3" style="background-color: var(--primary-color); border: none;">
                                <i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Masuk Sekarang
                            </button>
                            <p class="text-center text-muted mb-0">Belum punya akun? <a href="#" onclick="navigate('register')" class="text-decoration-none fw-bold" style="color: var(--primary-color);">Daftar di sini</a></p>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnLogin'); 
                btn.innerHTML = 'Memeriksa...'; 
                btn.disabled = true;
                
                const inputNisn = document.getElementById('nisn').value;
                const inputPassword = document.getElementById('password').value;

                try {
                    const { data: user, error } = await window.supabaseClient
                        .from('users')
                        .select('*')
                        .eq('nisn', inputNisn)
                        .maybeSingle(); 

                    if (error) throw error;

                    if (!user) {
                        Swal.fire('Gagal', 'NISN tidak terdaftar.', 'error');
                    } else if (user.password !== inputPassword) {
                        Swal.fire('Gagal', 'Password yang Anda masukkan salah.', 'error');
                    } else if (user.role !== 'student') {
                        Swal.fire('Akses Ditolak', 'Halaman ini khusus Siswa.', 'warning');
                    } else {
                        state.user = user; 
                        localStorage.setItem('edupro_student', JSON.stringify(user));
                        showToast(`Halo, ${user.full_name}!`); 
                        navigate('dashboard');
                    }
                } catch (err) {
                    console.error(err);
                    Swal.fire('Error', 'Terjadi kesalahan sistem saat login.', 'error');
                } finally {
                    btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Masuk Sekarang'; 
                    btn.disabled = false;
                }
            });
        };

        // ==========================================
        // TAMPILAN 2: REGISTER (TERHUBUNG SUPABASE)
        // ==========================================
        const renderRegister = () => {
            document.getElementById('app').innerHTML = `
                <div class="min-vh-100 d-flex align-items-center justify-content-center">
                    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
                        <h3 class="text-center fw-bold mb-4" style="color: var(--primary-color);">Daftar EduPro</h3>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nama Lengkap</label>
                                <input type="text" id="regName" class="form-control" required placeholder="Nama sesuai ijazah">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">NISN</label>
                                <input type="text" id="regNisn" class="form-control" required placeholder="Nomor Induk Siswa Nasional">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="regPassword" class="form-control" required placeholder="Buat password">
                            </div>
                            <button type="submit" id="btnRegister" class="btn btn-primary w-100 mb-3" style="background-color: var(--primary-color); border: none;">
                                <i class="fa-solid fa-user-plus me-2"></i> Daftar Sekarang
                            </button>
                            <p class="text-center text-muted mb-0">Sudah punya akun? <a href="#" onclick="navigate('login')" class="text-decoration-none fw-bold" style="color: var(--primary-color);">Masuk di sini</a></p>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnRegister'); 
                btn.innerHTML = 'Memproses...'; 
                btn.disabled = true;
                
                const regName = document.getElementById('regName').value;
                const regNisn = document.getElementById('regNisn').value;
                const regPassword = document.getElementById('regPassword').value;

                try {
                    const { data: existingUser, error: checkError } = await window.supabaseClient
                        .from('users')
                        .select('nisn')
                        .eq('nisn', regNisn)
                        .maybeSingle();

                    if (checkError) throw checkError;

                    if (existingUser) {
                        Swal.fire('Gagal', 'NISN sudah terdaftar! Silakan langsung Login.', 'error');
                        btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i> Daftar Sekarang'; 
                        btn.disabled = false;
                        return;
                    }

                    const { error: insertError } = await window.supabaseClient
                        .from('users')
                        .insert([
                            { full_name: regName, nisn: regNisn, password: regPassword, role: 'student' }
                        ]);

                    if (insertError) throw insertError;

                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Berhasil!', 
                        text: 'Pendaftaran berhasil! Silakan Login.', 
                        confirmButtonColor: '#4f46e5' 
                    }).then(() => navigate('login'));

                } catch (err) {
                    console.error(err);
                    Swal.fire('Error', 'Gagal mendaftar. Pastikan koneksi stabil.', 'error');
                    btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i> Daftar Sekarang'; 
                    btn.disabled = false;
                }
            });
        };

        // ==========================================
        // TAMPILAN 3: DASHBOARD DASAR (SEMENTARA)
        // ==========================================
        const renderDashboard = () => {
            document.getElementById('app').innerHTML = `
                <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: var(--primary-color);">
                    <div class="container">
                        <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-graduation-cap me-2"></i>EduPro LMS</a>
                        <button class="btn btn-danger btn-sm" onclick="logout()">
                            <i class="fa-solid fa-right-from-bracket"></i> Keluar
                        </button>
                    </div>
                </nav>

                <div class="container mt-5">
                    <div class="row">
                        <div class="col-12 text-center">
                            <h2>Selamat datang, <span class="fw-bold" style="color: var(--primary-color);">${state.user.full_name}</span>!</h2>
                            <p class="text-muted">Koneksi Supabase Anda telah berhasil 100%.</p>
                            <hr class="my-4">
                            <p>Saat ini kita berada di tahap migrasi. Tahap selanjutnya adalah memindahkan Katalog Kelas.</p>
                        </div>
                    </div>
                </div>
            `;
        };


        // ==========================================
        // PUSAT KENDALI APLIKASI (ROUTER)
        // ==========================================
        const renderApp = () => {
            // Jika belum login, paksa ke halaman login (kecuali sedang mendaftar)
            if (!state.user && state.view !== 'register') {
                state.view = 'login';
            }

            // Arahkan ke tampilan yang sesuai
            if (state.view === 'login') {
                renderLogin();
            } else if (state.view === 'register') {
                renderRegister();
            } else if (state.view === 'dashboard') {
                renderDashboard();
            }
            
            // Catatan: Nanti Anda bisa menambahkan renderCourse(), renderQuiz() dll di sini.
        };

        // --- JALANKAN APLIKASI SAAT HALAMAN DIBUKA ---
        renderApp();
    </script>
</body>
</html>
