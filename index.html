<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPro LMS | Portal Pembelajaran</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #4f46e5; --primary-hover: #4338ca; --bg-color: #f8fafc; --text-main: #0f172a; --text-muted: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        .navbar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card { border: none; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: transform 0.2s; background: white; }
        .card-hover:hover { transform: translateY(-5px); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .nav-link { font-weight: 500; color: var(--text-muted); cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: var(--primary-color); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Notifikasi Dropdown */
        .notif-dropdown { width: 320px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 1rem; padding: 0; }
        .notif-item { padding: 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.2s; }
        .notif-item:hover { background: #f8fafc; }
        .notif-item.unread { background: #eff6ff; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    
    <script src="app.js"></script>

    <script>
        let state = {
            user: JSON.parse(localStorage.getItem('edupro_user')) || null,
            currentView: localStorage.getItem('edupro_user') ? 'dashboard' : 'login',
            activeCourse: null,
            courses: [],
            notifications: []
        };

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID').format(angka);
        const showToast = (message, icon = 'success') => Swal.fire({ toast: true, position: 'top-end', icon, title: message, showConfirmButton: false, timer: 3000 });

        const renderApp = async () => {
            const app = document.getElementById('app');
            let html = '';

            if (state.user && state.currentView !== 'login') {
                // Fetch Notifikasi Unread
                const { data: notifs } = await window.supabaseClient.from('notifications').select('*').eq('student_id', state.user.id).order('created_at', { ascending: false });
                state.notifications = notifs || [];
                const unreadCount = state.notifications.filter(n => !n.is_read).length;

                html += `
                <nav class="navbar navbar-expand-lg sticky-top py-3">
                    <div class="container">
                        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" href="#" onclick="navigate('dashboard')">
                            <i class="fa-solid fa-graduation-cap text-primary me-2"></i>EduPro
                        </a>
                        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav ms-auto align-items-lg-center">
                                <li class="nav-item"><a class="nav-link ${state.currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')">Beranda</a></li>
                                <li class="nav-item"><a class="nav-link ${state.currentView === 'mycourses' ? 'active' : ''}" onclick="navigate('mycourses')">Kelas Saya</a></li>
                                
                                <li class="nav-item dropdown mx-2">
                                    <a class="nav-link position-relative" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                        <i class="fa-solid fa-bell fs-5"></i>
                                        ${unreadCount > 0 ? `<span class="position-absolute top-25 start-75 translate-middle badge rounded-pill bg-danger" style="font-size:0.6rem;">${unreadCount}</span>` : ''}
                                    </a>
                                    <ul class="dropdown-menu dropdown-menu-end notif-dropdown shadow">
                                        <li><h6 class="dropdown-header fw-bold bg-white text-dark py-3 border-bottom">Notifikasi</h6></li>
                                        ${state.notifications.length === 0 ? '<li class="p-4 text-center text-muted small">Belum ada notifikasi</li>' : state.notifications.map(n => `
                                            <li class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markNotifRead('${n.id}')">
                                                <div class="d-flex align-items-start">
                                                    <div class="bg-primary bg-opacity-10 text-primary p-2 rounded-circle me-3"><i class="fa-solid fa-info-circle"></i></div>
                                                    <div>
                                                        <h6 class="mb-1 fw-bold fs-6">${n.title}</h6>
                                                        <p class="mb-0 text-muted small" style="font-size:0.8rem">${n.message}</p>
                                                    </div>
                                                </div>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </li>

                                <li class="nav-item ms-lg-3">
                                    <button class="btn btn-light fw-bold rounded-pill px-4" onclick="navigate('profile')">
                                        <i class="fa-solid fa-user-circle me-2"></i>${state.user.full_name.split(' ')[0]}
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
                <main class="container py-4 py-md-5" id="main-content"></main>`;
            } else {
                html += `<main class="container d-flex align-items-center justify-content-center min-vh-100" id="main-content"></main>`;
            }
            app.innerHTML = html;

            const mainContent = document.getElementById('main-content');
            if (state.currentView === 'login') renderLogin(mainContent);
            else if (state.currentView === 'dashboard') renderDashboard(mainContent);
            else if (state.currentView === 'mycourses') renderMyCourses(mainContent);
            else if (state.currentView === 'profile') renderProfile(mainContent);
            else if (state.currentView === 'learn') renderLearnCourse(mainContent);
        };

        const navigate = (view, data = null) => { state.currentView = view; if(data) state.activeCourse = data; renderApp(); window.scrollTo(0,0); };

        window.markNotifRead = async (id) => {
            await window.supabaseClient.from('notifications').update({ is_read: true }).eq('id', id);
            renderApp();
        };

        const handleLogout = () => { localStorage.removeItem('edupro_user'); state.user = null; navigate('login'); };

        const renderLogin = (container) => {
            container.innerHTML = `
                <div class="card p-5 border-0 shadow-lg w-100" style="max-width: 450px;">
                    <div class="text-center mb-5">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px;"><i class="fa-solid fa-graduation-cap fa-2x"></i></div>
                        <h2 class="fw-bold text-dark mb-1">EduPro LMS</h2>
                        <p class="text-muted">Masuk ke portal belajar Anda</p>
                    </div>
                    <form id="loginForm">
                        <div class="mb-4 text-start"><label class="form-label fw-bold small text-muted">NISN / Username</label><input type="text" id="nisn" class="form-control form-control-lg bg-light" required></div>
                        <div class="mb-5 text-start"><label class="form-label fw-bold small text-muted">Kata Sandi</label><input type="password" id="password" class="form-control form-control-lg bg-light" required></div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm" id="btnLogin">Mulai Belajar <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                </div>`;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault(); const btn = document.getElementById('btnLogin'); btn.disabled = true; btn.innerHTML = 'Memeriksa...';
                const { data: user } = await window.supabaseClient.from('users').select('*').eq('nisn', document.getElementById('nisn').value).maybeSingle();
                if (!user || user.password !== document.getElementById('password').value) { Swal.fire('Gagal', 'NISN atau Password salah.', 'error'); btn.disabled = false; btn.innerHTML = 'Mulai Belajar'; return; }
                state.user = user; localStorage.setItem('edupro_user', JSON.stringify(user)); navigate('dashboard');
            });
        };

        const renderDashboard = async (container) => {
            container.innerHTML = `<div class="mb-5 text-center text-md-start"><span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mb-2">Selamat Datang 👋</span><h2 class="fw-bold text-dark display-6">Hai, ${state.user.full_name}!</h2><p class="text-muted fs-5">Mau belajar apa hari ini?</p></div><h4 class="fw-bold mb-4">Eksplorasi Kelas</h4><div class="row g-4" id="catalogList"><div class="col-12 text-center p-5"><span class="spinner-border text-primary"></span></div></div>`;
            
            const { data: courses } = await window.supabaseClient.from('courses').select('*');
            const { data: myTrx } = await window.supabaseClient.from('transactions').select('*').eq('student_id', state.user.id);
            
            let html = courses?.map(c => {
                const trx = myTrx?.find(t => t.course_id === c.id);
                let btn = `<button onclick="enrollCourse('${c.id}', ${c.price})" class="btn btn-primary w-100 rounded-pill py-2">Daftar Sekarang</button>`;
                if (trx) {
                    if (trx.status === 'PAID' || trx.status === 'approved') btn = `<button onclick="navigate('learn', {id: '${c.id}', title: '${c.title}'})" class="btn btn-success w-100 rounded-pill py-2"><i class="fa-solid fa-play me-2"></i>Lanjutkan Belajar</button>`;
                    else btn = `<button class="btn btn-warning text-dark w-100 rounded-pill py-2" disabled><i class="fa-solid fa-clock me-2"></i>Menunggu Verifikasi</button>`;
                }
                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card card-hover h-100 border-0 p-2">
                        <div class="card-body p-4 d-flex flex-column">
                            <div class="d-flex justify-content-between mb-3"><div class="bg-primary bg-opacity-10 text-primary p-3 rounded-4"><i class="fa-solid fa-book-open fs-3"></i></div><span class="badge ${c.price > 0 ? 'bg-warning text-dark' : 'bg-success'} px-3 py-2 rounded-pill shadow-sm">${c.price > 0 ? 'Rp '+formatRupiah(c.price) : 'Gratis'}</span></div>
                            <h5 class="fw-bold text-dark mb-2">${c.title}</h5>
                            <p class="text-muted small mb-4 flex-grow-1 line-clamp-2">${c.description}</p>
                            ${btn}
                        </div>
                    </div>
                </div>`;
            }).join('') || '<div class="col-12"><p class="text-muted">Belum ada kelas yang tersedia.</p></div>';
            document.getElementById('catalogList').innerHTML = html;
        };

        const renderProfile = (container) => {
            container.innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card p-4 p-md-5 border-0 shadow-sm">
                            <div class="text-center mb-4">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 100px; height: 100px; font-size: 2.5rem; font-weight: bold;">
                                    ${state.user.full_name.charAt(0).toUpperCase()}
                                </div>
                                <h3 class="fw-bold text-dark mb-1">${state.user.full_name}</h3>
                                <p class="text-muted mb-0">NISN: ${state.user.nisn}</p>
                            </div>
                            <hr class="my-4 text-muted">
                            <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-lock text-primary me-2"></i>Ganti Kata Sandi</h5>
                            <form id="formChangePassword">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-bold">Kata Sandi Baru</label>
                                    <input type="password" id="newPass" class="form-control bg-light" required minlength="4">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-bold">Konfirmasi Kata Sandi Baru</label>
                                    <input type="password" id="confirmPass" class="form-control bg-light" required minlength="4">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" id="btnSavePass">Simpan Kata Sandi</button>
                            </form>
                            <div class="mt-5 text-center">
                                <button onclick="handleLogout()" class="btn btn-outline-danger rounded-pill px-5"><i class="fa-solid fa-right-from-bracket me-2"></i>Keluar Aplikasi</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('formChangePassword').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPass = document.getElementById('newPass').value;
                const confirmPass = document.getElementById('confirmPass').value;
                if (newPass !== confirmPass) { Swal.fire('Gagal', 'Kata sandi tidak cocok.', 'error'); return; }

                const btn = document.getElementById('btnSavePass');
                btn.innerHTML = 'Menyimpan...'; btn.disabled = true;
                try {
                    await window.supabaseClient.from('users').update({ password: newPass }).eq('id', state.user.id);
                    Swal.fire('Berhasil!', 'Kata sandi diperbarui.', 'success');
                    document.getElementById('formChangePassword').reset();
                } catch (err) { Swal.fire('Gagal', 'Terjadi kesalahan.', 'error'); } 
                finally { btn.innerHTML = 'Simpan Kata Sandi'; btn.disabled = false; }
            });
        };

        window.enrollCourse = async (courseId, price) => { 
            Swal.fire({ 
                title: 'Daftar Kelas Ini?', 
                html: price == 0 ? "Kelas ini 100% Gratis!" : `Investasi: <b>Rp ${formatRupiah(price)}</b><br><br><small class="text-muted">Anda akan diminta melakukan transfer melalui QRIS/Manual.</small>`,
                icon: 'question', 
                showCancelButton: true, confirmButtonColor: '#4338ca', confirmButtonText: price == 0 ? 'Ya, Daftar' : 'Lanjut Pembayaran'
            }).then(async (res) => { 
                if(res.isConfirmed) { 
                    Swal.showLoading();
                    const status = price == 0 ? 'approved' : 'pending';
                    await window.supabaseClient.from('transactions').insert([{ student_id: state.user.id, course_id: courseId, amount: price, status }]);
                    
                    if(price == 0){
                        Swal.fire('Berhasil', 'Terdaftar di kelas gratis!', 'success').then(()=> navigate('dashboard'));
                    } else {
                        Swal.fire({
                            title: 'Instruksi Pembayaran',
                            html: `
                                <div class="text-center">
                                    <p class="mb-3">Silakan transfer senilai <b>Rp ${formatRupiah(price)}</b> ke E-Wallet berikut:</p>
                                    <div class="bg-light p-3 rounded-3 mb-3 border">
                                        <h5 class="fw-bold mb-1">GOPAY / OVO / DANA</h5>
                                        <p class="mb-0 fs-5 text-primary fw-bold">0812-3456-7890</p>
                                        <small class="text-muted">a.n. EduPro Admin</small>
                                    </div>
                                    <p class="small text-danger">Kirimkan bukti screenshot ke WhatsApp Guru agar kelas dibuka.</p>
                                </div>
                            `,
                            icon: 'info', confirmButtonText: 'Saya Mengerti', confirmButtonColor: '#4338ca'
                        }).then(()=> navigate('dashboard'));
                    }
                } 
            }); 
        };

        const renderMyCourses = async (container) => {
            container.innerHTML = `<h3 class="fw-bold mb-4">Kelas Saya</h3><div class="row g-4" id="myCourseList"><div class="col-12 text-center p-5"><span class="spinner-border"></span></div></div>`;
            const { data: myTrx } = await window.supabaseClient.from('transactions').select('course_id, status').eq('student_id', state.user.id);
            const { data: courses } = await window.supabaseClient.from('courses').select('*');
            
            let html = myTrx?.map(trx => {
                const c = courses?.find(c => c.id === trx.course_id); if(!c) return '';
                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm p-2">
                        <div class="card-body p-4 d-flex flex-column">
                            <h5 class="fw-bold text-dark mb-3">${c.title}</h5>
                            ${trx.status === 'PAID' || trx.status === 'approved' 
                                ? `<button onclick="navigate('learn', {id: '${c.id}', title: '${c.title}'})" class="btn btn-success w-100 rounded-pill py-2 mt-auto"><i class="fa-solid fa-play me-2"></i>Lanjutkan</button>`
                                : `<button class="btn btn-light text-warning w-100 rounded-pill py-2 mt-auto" disabled><i class="fa-solid fa-clock me-2"></i>Menunggu Approval</button>`}
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('myCourseList').innerHTML = html || '<div class="col-12"><p class="text-muted">Anda belum memiliki kelas.</p></div>';
        };

        const renderLearnCourse = async (container) => {
            container.innerHTML = `
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-3 mb-4 sticky-top" style="top: 100px;">
                        <h5 class="fw-bold mb-3">${state.activeCourse.title}</h5>
                        <div class="list-group list-group-flush" id="curriculumList">
                            <div class="text-center p-3"><span class="spinner-border spinner-border-sm text-primary"></span></div>
                        </div>
                        <button onclick="generateCertificate()" class="btn btn-outline-primary w-100 mt-3 rounded-pill"><i class="fa-solid fa-award me-2"></i>Unduh Sertifikat</button>
                    </div>
                </div>
                <div class="col-lg-8"><div class="card border-0 shadow-sm p-4 p-md-5" id="learnContent">Pilih materi di samping untuk mulai belajar.</div></div>
            </div>`;
            
            const { data: materials } = await window.supabaseClient.from('materials').select('*').eq('course_id', state.activeCourse.id).order('order_number');
            const { data: quizzes } = await window.supabaseClient.from('quizzes').select('*').eq('course_id', state.activeCourse.id);
            
            let html = materials?.map(m => `<button onclick="loadMaterial('${m.id}')" class="list-group-item list-group-item-action border-0 rounded mb-1"><i class="fa-solid ${m.content_url ? 'fa-video' : 'fa-file-alt'} text-primary me-2"></i>${m.title}</button>`).join('') || '';
            html += quizzes?.map(q => `<button onclick="loadQuiz('${q.id}')" class="list-group-item list-group-item-action border-0 rounded mb-1 bg-light text-dark fw-bold"><i class="fa-solid fa-tasks text-success me-2"></i>Kuis: ${q.title}</button>`).join('') || '';
            document.getElementById('curriculumList').innerHTML = html || '<p class="text-muted small">Belum ada materi.</p>';
            
            if(materials && materials.length > 0) loadMaterial(materials[0].id);
        };

        window.loadMaterial = async (id) => {
            document.getElementById('learnContent').innerHTML = '<div class="text-center p-5"><span class="spinner-border text-primary"></span></div>';
            const { data: m } = await window.supabaseClient.from('materials').select('*').eq('id', id).single();
            if(!m) return;
            let contentHtml = m.content_url ? `<div class="ratio ratio-16x9 mb-4 rounded overflow-hidden shadow-sm"><iframe src="${m.content_url}" allowfullscreen></iframe></div>` : '';
            document.getElementById('learnContent').innerHTML = `
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mb-3">Materi Belajar</span>
                <h3 class="fw-bold mb-4">${m.title}</h3>
                ${contentHtml}
                <div class="lh-lg text-muted fs-6">${m.description.replace(/\\n/g, '<br>')}</div>
            `;
        };

        window.loadQuiz = async (id) => {
            document.getElementById('learnContent').innerHTML = '<div class="text-center p-5"><span class="spinner-border text-primary"></span></div>';
            const { data: q } = await window.supabaseClient.from('quizzes').select('*').eq('id', id).single();
            const { data: sub } = await window.supabaseClient.from('submissions').select('*').eq('quiz_id', id).eq('student_id', state.user.id).maybeSingle();
            
            if (sub) {
                document.getElementById('learnContent').innerHTML = `
                    <div class="text-center p-5">
                        <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" style="width:80px; height:80px;"><i class="fa-solid fa-check-double fa-2x"></i></div>
                        <h3 class="fw-bold">Anda sudah mengerjakan kuis ini</h3>
                        <p class="text-muted fs-5">Nilai Anda: <strong class="text-dark">${sub.score !== null ? sub.score : 'Belum dinilai'}</strong> / 100</p>
                    </div>`;
                return;
            }

            document.getElementById('learnContent').innerHTML = `
                <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill mb-3">Ujian / Kuis</span>
                <h3 class="fw-bold mb-4">${q.title}</h3>
                <div class="bg-light p-4 rounded-3 mb-4"><p class="mb-0 fw-medium">${q.question}</p></div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted">Jawaban Anda:</label>
                    <textarea id="answerText" class="form-control bg-light border-0 p-3" rows="5" placeholder="Ketik jawaban Anda di sini..."></textarea>
                </div>
                <button onclick="submitQuiz('${q.id}')" class="btn btn-success rounded-pill px-5 py-2 fw-bold">Kirim Jawaban <i class="fa-solid fa-paper-plane ms-2"></i></button>
            `;
        };

        window.submitQuiz = async (quizId) => {
            const answer = document.getElementById('answerText').value;
            if(!answer.trim()) return Swal.fire('Oops', 'Jawaban tidak boleh kosong!', 'warning');
            Swal.showLoading();
            await window.supabaseClient.from('submissions').insert([{ quiz_id: quizId, student_id: state.user.id, answer }]);
            Swal.fire('Berhasil', 'Jawaban terkirim! Menunggu penilaian guru.', 'success');
            loadQuiz(quizId);
        };

        window.generateCertificate = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const today = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            const qrCode = new QRious({ value: `Validasi: ${state.user.nisn} - ${state.activeCourse.title}`, size: 100 });
            const qrImg = qrCode.toDataURL('image/png');

            doc.setFillColor(248, 250, 252); doc.rect(0, 0, 297, 210, 'F');
            doc.setDrawColor(79, 70, 229); doc.setLineWidth(5); doc.rect(10, 10, 277, 190);
