<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPro LMS | Portal Pembelajaran Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }
        
        :root { 
            --primary-color: #4338ca; /* Deep Indigo */
            --primary-hover: #3730a3; 
            --secondary-color: #0ea5e9; /* Sky Blue */
            --bg-color: #f8fafc; /* Slate 50 */
            --text-main: #0f172a; 
            --text-muted: #64748b; 
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Modern Navbar */
        .navbar { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); padding: 1rem 0; }
        .navbar-brand { font-weight: 800; color: var(--primary-color) !important; font-size: 1.5rem; letter-spacing: -0.5px;}
        
        /* Premium Buttons */
        .btn { font-weight: 600; border-radius: 0.75rem; padding: 0.6rem 1.5rem; transition: all 0.2s ease; }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); border-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2); }
        .btn-outline-primary { color: var(--primary-color); border-color: var(--primary-color); }
        .btn-outline-primary:hover { background-color: var(--primary-color); color: white; }

        /* Modern Cards */
        .card { border: none; border-radius: 1.25rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; overflow: hidden; }
        .card-hover:hover { transform: translateY(-7px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* Elegant Form Inputs */
        .form-control { border-radius: 0.75rem; padding: 0.8rem 1.2rem; border: 1px solid #e2e8f0; background-color: #f8fafc; transition: all 0.2s; }
        .form-control:focus { background-color: #fff; border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(67, 56, 202, 0.1); }
        
        /* Sleek Tabs */
        .nav-tabs { border-bottom: 2px solid #e2e8f0; gap: 1rem; }
        .nav-tabs .nav-link { border: none; color: var(--text-muted); font-weight: 600; padding: 1rem 0.5rem; background: transparent; position: relative; }
        .nav-tabs .nav-link:hover { color: var(--primary-color); }
        .nav-tabs .nav-link.active { color: var(--primary-color); background: transparent; }
        .nav-tabs .nav-link.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background-color: var(--primary-color); border-radius: 3px 3px 0 0; }

        /* Price Badge */
        .price-badge { position: absolute; top: 1.25rem; right: 1.25rem; font-size: 0.85rem; font-weight: 700; padding: 0.4rem 1rem; border-radius: 2rem; z-index: 2; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Progress Bar */
        .progress { height: 8px; border-radius: 10px; background-color: #e2e8f0; }
        .progress-bar { border-radius: 10px; }
        .progress-bar.bg-success { background-color: #10b981 !important; }

        /* Custom Quiz Options */
        .quiz-option { cursor: pointer; border: 2px solid #e2e8f0; border-radius: 1rem; transition: all 0.2s ease; }
        .quiz-option:hover { border-color: #cbd5e1; background-color: #f8fafc; }
        .quiz-option.selected { border-color: var(--primary-color); background-color: rgba(67, 56, 202, 0.04); }
        
        /* Rich Text Cleanup */
        .ql-editor { padding: 0 !important; font-family: inherit; font-size: 1.05rem; line-height: 1.7; color: #334155; }
        .ql-editor img { max-width: 100%; border-radius: 12px; margin: 15px 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Certificate Button Glow */
        .cert-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Hero Banner Gradient */
        .hero-banner { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); position: relative; overflow: hidden; }
        .hero-glow { position: absolute; top: 0; right: 0; width: 400px; height: 400px; background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%); opacity: 0.4; border-radius: 50%; transform: translate(30%, -30%); }
        
        /* Notifikasi Dropdown */
        .notif-dropdown { width: 320px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 1rem; padding: 0; }
        .notif-item { padding: 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.2s; }
        .notif-item:hover { background: #f8fafc; }
        .notif-item.unread { background: #eff6ff; }
    </style>
     
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script src="app.js"></script>   

    <script>
        let state = {
            user: JSON.parse(localStorage.getItem('edupro_student')) || null,
            currentView: localStorage.getItem('edupro_student') ? 'dashboard' : 'catalog', 
            activeCourse: null,
            activeTab: 'materi',
            courses: [],
            notifications: [] 
        };

        const showToast = (message, icon = 'success') => Swal.fire({ toast: true, position: 'top-end', icon, title: message, showConfirmButton: false, timer: 3000 });
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID').format(angka);

        const renderApp = async () => {
            const app = document.getElementById('app');
            let html = `
                <nav class="navbar navbar-expand-lg sticky-top">
                    <div class="container">
                        <a class="navbar-brand d-flex align-items-center gap-2" href="#" onclick="navigate(${state.user ? "'dashboard'" : "'catalog'"})">
                            <i class="fa-solid fa-graduation-cap"></i> EduPro
                        </a>
                        <div class="d-flex align-items-center gap-3">`;
            
            if (state.user) { 
                const { data: notifs } = await window.supabaseClient.from('notifications').select('*').eq('student_id', state.user.id).order('created_at', { ascending: false });
                state.notifications = notifs || [];
                const unreadCount = state.notifications.filter(n => !n.is_read).length;

                html += `
                            <div class="dropdown">
                                <a href="#" class="text-dark position-relative me-2 d-flex align-items-center justify-content-center" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9;">
                                    <i class="fa-solid fa-bell fs-5"></i>
                                    ${unreadCount > 0 ? `<span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">${unreadCount}</span>` : ''}
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end notif-dropdown mt-3 border-0">
                                    <li><h6 class="dropdown-header fw-bold bg-white text-dark py-3 border-bottom">Notifikasi Anda</h6></li>
                                    ${state.notifications.length === 0 ? '<li class="p-4 text-center text-muted small">Belum ada notifikasi</li>' : state.notifications.map(n => `
                                        <li class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markNotifRead('${n.id}')">
                                            <div class="d-flex align-items-start">
                                                <div class="bg-primary bg-opacity-10 text-primary p-2 rounded-circle me-3 mt-1"><i class="fa-solid fa-bell"></i></div>
                                                <div>
                                                    <h6 class="mb-1 fw-bold fs-6 text-dark">${n.title}</h6>
                                                    <p class="mb-0 text-muted small" style="font-size:0.8rem">${n.message}</p>
                                                </div>
                                            </div>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>

                            <div class="text-end d-none d-sm-block" style="cursor:pointer;" onclick="navigate('profile')">
                                <div class="fw-bold text-dark lh-1">${state.user.full_name}</div>
                                <small class="text-primary fw-bold" style="font-size: 0.8rem;"><i class="fa-solid fa-user me-1"></i>Lihat Profil</small>
                            </div>
                            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm rounded-pill px-3 ms-1" title="Keluar">
                                <i class="fa-solid fa-right-from-bracket"></i>
                            </button>`; 
            } else { 
                html += `
                            <button onclick="navigate('login')" class="btn btn-outline-primary rounded-pill px-4">Masuk</button>
                            <button onclick="navigate('register')" class="btn btn-primary rounded-pill px-4">Daftar</button>`; 
            }
            html += `</div></div></nav><main class="container py-4 py-md-5 flex-grow-1" id="main-content"></main>`;
            app.innerHTML = html;

            const mainContent = document.getElementById('main-content');
            if (state.currentView === 'catalog') renderPublicCatalog(mainContent);
            else if (state.currentView === 'login') renderLogin(mainContent);
            else if (state.currentView === 'register') renderRegister(mainContent);
            else if (state.currentView === 'dashboard') renderDashboard(mainContent);
            else if (state.currentView === 'courseDetail') renderCourseDetail(mainContent);
            else if (state.currentView === 'profile') renderProfile(mainContent); 
        };

        const navigate = (view, courseData = null) => {
            state.currentView = view;
            if (courseData) { state.activeCourse = courseData; state.activeTab = 'materi'; }
            renderApp(); window.scrollTo(0,0);
        };

        window.markNotifRead = async (id) => {
            await window.supabaseClient.from('notifications').update({ is_read: true }).eq('id', id);
            renderApp(); 
        };

        // ==========================================
        // LANDING PAGE BARU (PUBLIC CATALOG)
        // ==========================================
        const renderPublicCatalog = async (container) => {
            container.innerHTML = `
                <div class="hero-banner p-4 p-md-5 mb-5 rounded-4 text-white shadow-lg text-center text-md-start">
                    <div class="hero-glow"></div>
                    <div class="row align-items-center position-relative z-index-1">
                        <div class="col-md-7 mb-4 mb-md-0">
                            <span class="badge bg-white text-primary px-3 py-2 rounded-pill mb-3 fw-bold shadow-sm">Platform Belajar Interaktif</span>
                            <h1 class="fw-bold display-5 mb-3 lh-sm" style="letter-spacing: -1px;">Tingkatkan Keahlian Anda Bersama EduPro</h1>
                            <p class="fs-5 text-white-50 mb-4" style="max-width: 90%;">Akses ratusan materi berkualitas, kerjakan kuis interaktif, dan raih sertifikat kelulusan yang diakui oleh industri.</p>
                            <div class="d-flex gap-3 justify-content-center justify-content-md-start">
                                <button onclick="navigate('register')" class="btn btn-light text-primary rounded-pill px-4 py-2 fw-bold shadow">Mulai Belajar Sekarang</button>
                                <a href="#katalog-kelas" class="btn btn-outline-light rounded-pill px-4 py-2 fw-bold">Eksplor Kelas</a>
                            </div>
                        </div>
                        <div class="col-md-5 d-none d-md-block text-center">
                            <i class="fa-solid fa-user-graduate" style="font-size: 10rem; opacity: 0.9; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));"></i>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-5 text-center px-2">
                    <div class="col-md-4">
                        <div class="card p-4 h-100 border-0 shadow-sm bg-white card-hover">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px;"><i class="fa-solid fa-laptop-file fs-3"></i></div>
                            <h5 class="fw-bold text-dark">Materi Interaktif</h5>
                            <p class="text-muted small mb-0">Belajar lebih asik dengan modul terstruktur, video, teks, dan tugas praktik yang mudah dipahami.</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-4 h-100 border-0 shadow-sm bg-white card-hover">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px;"><i class="fa-solid fa-certificate fs-3"></i></div>
                            <h5 class="fw-bold text-dark">Sertifikat Validasi</h5>
                            <p class="text-muted small mb-0">Dapatkan sertifikat kelulusan resmi ber-QR code setelah Anda berhasil lulus ujian akhir kelas.</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-4 h-100 border-0 shadow-sm bg-white card-hover">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 70px; height: 70px;"><i class="fa-solid fa-infinity fs-3"></i></div>
                            <h5 class="fw-bold text-dark">Akses Selamanya</h5>
                            <p class="text-muted small mb-0">Cukup mendaftar satu kali, pelajari materi berkali-kali kapanpun dan dimanapun tanpa batas waktu.</p>
                        </div>
                    </div>
                </div>

                <div id="katalog-kelas" class="pt-2 mb-4 mt-5 d-flex justify-content-between align-items-end">
                    <div class="text-center text-md-start w-100">
                        <h3 class="fw-bold text-dark mb-1">Katalog Kelas Premium</h3>
                        <p class="text-muted mb-0">Pilih program yang sesuai dengan tujuan karir Anda.</p>
                    </div>
                </div>
                <div id="publicCourseList" class="row g-4 mb-5">
                    <div class="col-12 text-center p-5"><div class="spinner-border text-primary"></div></div>
                </div>
                
                <div class="card bg-primary bg-opacity-10 border-0 rounded-4 p-5 text-center mb-4 mt-4">
                    <h3 class="fw-bold text-primary mb-3">Siap untuk Memulai Perjalanan Anda?</h3>
                    <p class="text-muted mb-4 mx-auto" style="max-width: 600px;">Bergabunglah dengan ratusan siswa lainnya yang telah meningkatkan keahlian mereka bersama EduPro.</p>
                    <div><button onclick="navigate('register')" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm">Daftar Akun Gratis <i class="fa-solid fa-arrow-right ms-2"></i></button></div>
                </div>
                `;
                
            const { data: courses } = await window.supabaseClient.from('courses').select('*').order('created_at', { ascending: false });
            let html = (courses||[]).map(c => `
                <div class="col-md-6 col-lg-4">
                    <div class="card card-hover h-100 border-0" onclick="handleGuestClick()" style="cursor: pointer;">
                        <span class="price-badge ${c.price==0?'bg-success text-white':'bg-white text-dark shadow-sm'}">${c.price==0?'Gratis':'Rp '+formatRupiah(c.price)}</span>
                        <div class="position-relative" style="height: 180px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));">
                            <div class="position-absolute top-50 start-50 translate-middle text-white"><i class="fa-solid fa-laptop-code fa-4x opacity-50"></i></div>
                        </div>
                        <div class="card-body d-flex flex-column p-4">
                            <h5 class="fw-bold mb-2 text-dark lh-base">${c.title}</h5>
                            <p class="text-muted small mb-4 flex-grow-1" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${c.description}</p>
                            <div class="d-flex align-items-center justify-content-between border-top pt-3 mt-auto">
                                <span class="text-primary fw-bold small"><i class="fa-solid fa-book-open me-2"></i>Lihat Detail Kelas</span>
                                <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;"><i class="fa-solid fa-arrow-right text-primary"></i></div>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
            document.getElementById('publicCourseList').innerHTML = html || `<div class="col-12 text-center text-muted p-5 bg-white rounded-4 shadow-sm">Katalog kelas sedang kosong.</div>`;
        };
        
        window.handleGuestClick = () => { Swal.fire({ title: 'Akses Dibatasi', text: 'Silakan Login atau Daftar akun untuk mulai belajar.', icon: 'info', showCancelButton: true, confirmButtonText: 'Login Sekarang', cancelButtonText: 'Daftar Baru', confirmButtonColor: '#4338ca' }).then((r) => { if(r.isConfirmed) navigate('login'); else if(r.dismiss===Swal.DismissReason.cancel) navigate('register'); }); };

        const renderLogin = (container) => {
            container.innerHTML = `
                <div class="row justify-content-center mt-3">
                    <div class="col-md-6 col-lg-5">
                        <div class="card p-5 border-0 shadow">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold text-dark mb-1">Selamat Datang 👋</h2>
                                <p class="text-muted">Masuk ke ruang belajar Anda</p>
                            </div>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-muted">NISN / Username</label>
                                    <input type="text" id="nisn" class="form-control" placeholder="Masukkan NISN" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold small text-muted">Password</label>
                                    <input type="password" id="password" class="form-control" placeholder="Masukkan Password" required>
                                </div>
                                <button class="btn btn-primary w-100 mb-4 py-2" id="btnLogin">Masuk ke Dashboard</button>
                                <p class="text-center text-muted small mb-0">Belum punya akun? <a href="#" onclick="navigate('register')" class="text-primary fw-bold text-decoration-none">Daftar sekarang</a></p>
                            </form>
                        </div>
                    </div>
                </div>`;
            document.getElementById('loginForm').addEventListener('submit', async (e) => { 
                e.preventDefault(); 
                const btn = document.getElementById('btnLogin'); btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memeriksa...'; btn.disabled = true;
                const { data: user } = await window.supabaseClient.from('users').select('*').eq('nisn', document.getElementById('nisn').value).maybeSingle(); 
                if(user && user.password === document.getElementById('password').value && user.role === 'student'){ 
                    state.user = user; localStorage.setItem('edupro_student', JSON.stringify(user)); navigate('dashboard'); 
                } else { 
                    Swal.fire('Login Gagal', 'NISN tidak terdaftar atau password salah.', 'error'); 
                    btn.innerHTML = 'Masuk ke Dashboard'; btn.disabled = false;
                } 
            });
        };

        const renderRegister = (container) => {
            container.innerHTML = `
                <div class="row justify-content-center mt-3">
                    <div class="col-md-6 col-lg-5">
                        <div class="card p-5 border-0 shadow">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold text-dark mb-1">Buat Akun Baru</h2>
                                <p class="text-muted">Mulai perjalanan karir Anda</p>
                            </div>
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-muted">Nama Lengkap</label>
                                    <input type="text" id="regName" class="form-control" placeholder="Cth: Budi Santoso" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-muted">NISN / Username</label>
                                    <input type="text" id="regNisn" class="form-control" placeholder="Cth: 12345678" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold small text-muted">Buat Password</label>
                                    <input type="password" id="regPassword" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
                                </div>
                                <button class="btn btn-primary w-100 mb-4 py-2">Daftar Akun</button>
                                <p class="text-center text-muted small mb-0">Sudah punya akun? <a href="#" onclick="navigate('login')" class="text-primary fw-bold text-decoration-none">Login di sini</a></p>
                            </form>
                        </div>
                    </div>
                </div>`;
            document.getElementById('registerForm').addEventListener('submit', async (e) => { 
                e.preventDefault(); 
                await window.supabaseClient.from('users').insert([{ full_name: document.getElementById('regName').value, nisn: document.getElementById('regNisn').value, password: document.getElementById('regPassword').value, role: 'student' }]); 
                Swal.fire('Berhasil Terdaftar!', 'Akun Anda sudah siap, silakan Login.', 'success').then(()=>navigate('login')); 
            });
        };

        const handleLogout = () => { localStorage.removeItem('edupro_student'); state.user = null; navigate('catalog'); };

        const renderProfile = (container) => {
            container.innerHTML = `
                <button onclick="navigate('dashboard')" class="btn btn-link text-muted p-0 mb-4 text-decoration-none fw-semibold">
                    <i class="fa-solid fa-arrow-left me-2"></i> Kembali ke Dashboard
                </button>
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card p-4 p-md-5 border-0 shadow-sm">
                            <div class="text-center mb-4">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 100px; height: 100px; font-size: 2.5rem; font-weight: bold;">
                                    ${state.user.full_name.charAt(0).toUpperCase()}
                                </div>
                                <h3 class="fw-bold text-dark mb-1">${state.user.full_name}</h3>
                                <p class="text-muted mb-0">NISN / Username: ${state.user.nisn}</p>
                            </div>
                            <hr class="my-4 text-muted border-secondary opacity-25">
                            <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-lock text-primary me-2"></i>Ganti Kata Sandi</h5>
                            <form id="formChangePassword">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-bold">Kata Sandi Baru</label>
                                    <input type="password" id="newPass" class="form-control bg-light" required minlength="4">
                                </div>

        };

       window.downloadCertificate = async () => {
            Swal.fire({ title: 'Mencetak Sertifikat...', text: 'Mempersiapkan desain resolusi tinggi...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            try {
                const loadImage = (url) => new Promise((res, rej) => { const img = new Image(); img.crossOrigin = 'Anonymous'; img.onload = () => res(img); img.onerror = () => rej(new Error('Gagal: ' + url)); img.src = url; });
                const shortId = state.user.id ? state.user.id.substring(0, 8).toUpperCase() : '001';
                const certNumber = `CERT-EDU-${shortId}`;
                const today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }); 
                const qrText = `Validasi EduPro\nNomor: ${certNumber}\nTanggal: ${today}\nNama: ${state.user.full_name}\nKelas: ${state.activeCourse.title}\nSkor: ${window.courseFinalScore}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrText)}`;
                
                // Memuat background baru dan QR Code (Tanpa Logo)
                const [bgImg, qrImg] = await Promise.all([ 
                    loadImage('https://i.ibb.co.com/V0mYH0mw/sertifikat-background.png'), 
                    loadImage(qrUrl) 
                ]);
                
                const { jsPDF } = window.jspdf; 
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' }); 
                
                // Memasang background
                doc.addImage(bgImg, 'PNG', 0, 0, 297, 210);
                
                // Mencetak Teks Sertifikat
                doc.setFont('helvetica', 'bold'); doc.setFontSize(28); doc.setTextColor(15, 23, 42);
                doc.text("SERTIFIKAT KELULUSAN", 148.5, 65, { align: 'center' });
                doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(100, 116, 139);
                doc.text(`Nomor Dokumen: ${certNumber}`, 148.5, 72, { align: 'center' });
                doc.setFontSize(13); doc.setTextColor(71, 85, 105); doc.text("Dengan bangga dianugerahkan kepada:", 148.5, 87, { align: 'center' });
                doc.setFont('helvetica', 'bold'); doc.setFontSize(34); doc.setTextColor(15, 23, 42); 
                doc.text(state.user.full_name, 148.5, 101, { align: 'center' }); 
                doc.setFontSize(13); doc.setFont('helvetica', 'normal'); doc.setTextColor(71, 85, 105);
                doc.text("Atas dedikasi dan keberhasilannya menyelesaikan program kelas premium:", 148.5, 115, { align: 'center' });
                doc.setFontSize(24); doc.setFont('helvetica', 'bold'); doc.setTextColor(79, 70, 229); 
                doc.text(state.activeCourse.title, 148.5, 127, { align: 'center' });
                doc.setFontSize(13); doc.setFont('helvetica', 'italic'); doc.setTextColor(15, 23, 42);
                doc.text(`Predikat: ${window.coursePredikat}   |   Skor Akhir: ${window.courseFinalScore}`, 148.5, 137, { align: 'center' });
                doc.setFontSize(12); doc.setFont('helvetica', 'normal'); doc.setTextColor(71, 85, 105);
                doc.text(`Diberikan pada tanggal: ${today}`, 148.5, 145, { align: 'center' });
                
                // Memasang QR Code
                doc.addImage(qrImg, 'PNG', 137.5, 149, 22, 22);
                
                // Tanda Tangan
                doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor(15, 23, 42);
                doc.text("Dr. Faisal Amir, M.Pd", 148.5, 178, { align: 'center' }); 
                doc.setDrawColor(15, 23, 42); doc.setLineWidth(0.5); doc.line(125, 180, 172, 180); 
                doc.setFontSize(11); doc.setFont('helvetica', 'normal'); doc.setTextColor(71, 85, 105);
                doc.text("Direktur Utama EduPro", 148.5, 186, { align: 'center' });
                
                // Simpan PDF
                doc.save(`Sertifikat_${state.activeCourse.title.replace(/\s+/g, '_')}.pdf`); 
                Swal.fire('Berhasil!', 'Sertifikat resmi berhasil dicetak.', 'success');
            } catch(e) { 
                console.error("Detail Error:", e);
                Swal.fire('Gagal', 'Gagal memuat gambar atau mencetak sertifikat. Cek koneksi internet Anda.', 'error'); 
            }
        };

        renderApp();
    </script>
