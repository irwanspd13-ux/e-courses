<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPro Admin | Dashboard Guru</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css" rel="stylesheet">  
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        :root { --primary-color: #0ea5e9; --primary-hover: #0284c7; --bg-color: #f1f5f9; --text-main: #0f172a; --text-muted: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); transition: transform 0.2s ease, box-shadow 0.2s ease;}
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn { font-weight: 600; border-radius: 0.75rem; padding: 0.6rem 1.2rem; }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); color: white;}
        .form-control, .form-select { border-radius: 0.75rem; padding: 0.75rem 1rem; border-color: #e2e8f0; }
        .navbar { background-color: #ffffff; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); padding: 1rem 0; }
        .navbar-brand { font-weight: 800; color: var(--text-main) !important; font-size: 1.5rem; }
        .nav-tabs .nav-link { border: none; color: var(--text-muted); font-weight: 600; padding: 1rem 1.5rem; border-bottom: 3px solid transparent; }
        .nav-tabs .nav-link.active { color: var(--primary-color); background: transparent; border-bottom: 3px solid var(--primary-color); }
        .price-badge { position: absolute; top: 1rem; right: 1rem; font-size: 0.85rem; font-weight: 700; padding: 0.5rem 0.8rem; border-radius: 2rem; z-index: 2;}
        .ql-editor { min-height: 150px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script src="app.js"></script>

    <script>
        let state = {
            user: JSON.parse(localStorage.getItem('edupro_admin')) || null,
            currentView: localStorage.getItem('edupro_admin') ? 'dashboard' : 'login',
            activeCourse: null,
            activeTab: 'materi',
            courses: []
        };

        const showToast = (message, icon = 'success') => Swal.fire({ toast: true, position: 'top-end', icon, title: message, showConfirmButton: false, timer: 3000 });
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID').format(angka);

        const renderApp = () => {
            const app = document.getElementById('app');
            let html = '';
            if (state.user && state.currentView !== 'login') {
                html += `<nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand" href="#" onclick="navigate('dashboard')"><i class="fa-solid fa-chalkboard-user text-primary"></i> EduPro Admin</a><div class="d-flex align-items-center gap-3"><div class="text-end d-none d-sm-block"><div class="fw-bold">${state.user.full_name}</div><small class="text-muted">Pengajar</small></div><button onclick="handleLogout()" class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button></div></div></nav>`;
            }
            html += `<main class="container py-4 flex-grow-1" id="main-content"></main>`;
            app.innerHTML = html;

            const mainContent = document.getElementById('main-content');
            if (state.currentView === 'login') renderLogin(mainContent);
            else if (state.currentView === 'dashboard') renderTeacherDashboard(mainContent);
            else if (state.currentView === 'courseDetail') renderCourseDetail(mainContent);
            else if (state.currentView === 'transactions') renderTransactions(mainContent);
        };

        const navigate = (view, courseData = null) => { state.currentView = view; if (courseData) state.activeCourse = courseData; renderApp(); };
        window.openCourseGlobal = (id) => { const course = state.courses.find(c => c.id === id); if (course) navigate('courseDetail', course); };

        const renderLogin = (container) => {
            container.innerHTML = `<div class="row justify-content-center align-items-center h-100 mt-5"><div class="col-12 col-md-5"><div class="card p-5 text-center"><h2 class="fw-bold text-primary">Admin Panel</h2><p class="text-muted mb-4">Akses Guru</p><form id="loginForm"><div class="mb-3 text-start"><label class="form-label">ID Guru</label><input type="text" id="nisn" class="form-control" required></div><div class="mb-4 text-start"><label class="form-label">Password</label><input type="password" id="password" class="form-control"></div><button type="submit" class="btn btn-primary w-100" id="btnLogin">Masuk</button></form></div></div></div>`;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault(); const btn = document.getElementById('btnLogin'); btn.innerHTML = 'Memeriksa...'; btn.disabled = true;
                try {
                    const { data: user, error } = await window.supabaseClient.from('users').select('*').eq('nisn', document.getElementById('nisn').value).maybeSingle();
                    if (!user) Swal.fire('Gagal', 'NIP tidak terdaftar.', 'error');
                    else if (user.password !== document.getElementById('password').value) Swal.fire('Gagal', 'Password salah.', 'error');
                    else if (user.role !== 'teacher' && user.role !== 'admin') Swal.fire('Ditolak', 'Khusus Guru.', 'warning');
                    else { state.user = user; localStorage.setItem('edupro_admin', JSON.stringify(user)); navigate('dashboard'); }
                } catch (err) {} finally { btn.innerHTML = 'Masuk'; btn.disabled = false; }
            });
        };

        const handleLogout = () => { localStorage.removeItem('edupro_admin'); state.user = null; navigate('login'); };

        const renderTeacherDashboard = async (container) => {
            container.innerHTML = `
                <div class="row g-4 mb-4">
                    <div class="col-lg-6"><div class="card p-4 h-100"><h5 class="fw-bold mb-3">Buat Kelas Baru</h5><form id="formAddCourse"><input type="text" id="cTitle" class="form-control mb-3" placeholder="Judul Kelas" required><textarea id="cDesc" class="form-control mb-3" placeholder="Deskripsi..."></textarea><input type="number" id="cPrice" class="form-control mb-3" placeholder="Harga (0 jika Gratis)"><button class="btn btn-primary w-100">Buat Kelas</button></form></div></div>
                    <div class="col-lg-6"><div class="card p-4 h-100 bg-primary bg-opacity-10"><h5 class="fw-bold mb-3 text-primary">Daftar Siswa Manual</h5><form id="formAddStudent"><input type="text" id="sName" class="form-control mb-3" placeholder="Nama Siswa" required><input type="text" id="sNisn" class="form-control mb-3" placeholder="NISN" required><button class="btn btn-primary w-100">Tambah Siswa</button></form></div></div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3 mt-5"><h4 class="fw-bold mb-0">Katalog Kelas Saya</h4><button onclick="navigate('transactions')" class="btn btn-warning fw-bold text-dark px-4"><i class="fa-solid fa-money-bill-transfer me-2"></i>Kelola Transaksi</button></div>
                <div id="courseList" class="row g-4"></div>`;

            document.getElementById('formAddCourse').addEventListener('submit', async (e) => { e.preventDefault(); await window.supabaseClient.from('courses').insert([{ title: document.getElementById('cTitle').value, description: document.getElementById('cDesc').value, price: document.getElementById('cPrice').value || 0, teacher_id: state.user.id }]); showToast('Kelas dibuat!'); document.getElementById('formAddCourse').reset(); loadTeacherCourses(); });
            document.getElementById('formAddStudent').addEventListener('submit', async (e) => { e.preventDefault(); await window.supabaseClient.from('users').insert([{ full_name: document.getElementById('sName').value, nisn: document.getElementById('sNisn').value, role: 'student', password: '123' }]); showToast('Siswa ditambahkan!'); document.getElementById('formAddStudent').reset(); });
            loadTeacherCourses();
        };

        const loadTeacherCourses = async () => {
            const { data: courses } = await window.supabaseClient.from('courses').select('*').eq('teacher_id', state.user.id).order('created_at', { ascending: false });
            state.courses = courses || [];
            let html = state.courses.length === 0 ? `<div class="col-12 text-center text-muted p-5 bg-white rounded">Belum ada kelas.</div>` : state.courses.map(c => `<div class="col-md-6 col-lg-4"><div class="card card-hover h-100"><span class="price-badge bg-secondary text-white">${c.price > 0 ? 'Rp '+formatRupiah(c.price) : 'Gratis'}</span><div class="card-body d-flex flex-column mt-3"><h5 class="fw-bold">${c.title}</h5><p class="text-muted small flex-grow-1">${c.description}</p><button onclick="openCourseGlobal('${c.id}')" class="btn btn-outline-primary w-100">Kelola Kelas</button></div></div></div>`).join('');
            document.getElementById('courseList').innerHTML = html;
        };

        const renderTransactions = async (container) => {
            container.innerHTML = `<button onclick="navigate('dashboard')" class="btn btn-link text-muted p-0 mb-4"><i class="fa-solid fa-arrow-left me-1"></i> Kembali</button><h3 class="fw-bold mb-4">Transaksi Masuk</h3><div class="card border-0 shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0"><thead class="table-light"><tr><th>Waktu</th><th>Siswa</th><th>Kelas</th><th class="text-center">Status</th><th class="text-center">Aksi</th></tr></thead><tbody id="trxTableBody"></tbody></table></div></div>`;
            const { data: trxList } = await window.supabaseClient.from('transactions').select('id, created_at, status, student_id, course_id').order('created_at', { ascending: false });
            const { data: users } = await window.supabaseClient.from('users').select('id, full_name');
            const { data: courses } = await window.supabaseClient.from('courses').select('id, title');
            
            let html = (trxList||[]).map(t => {
                const date = new Date(t.created_at).toLocaleDateString('id-ID');
                const student = users.find(u=>u.id === t.student_id)?.full_name || 'Siswa';
                const course = courses.find(c=>c.id === t.course_id)?.title || 'Kelas';
                const isPaid = t.status === 'PAID' || t.status === 'approved';
                return `<tr><td>${date}</td><td class="fw-bold">${student}</td><td>${course}</td><td class="text-center">${isPaid ? '<span class="badge bg-success">LUNAS</span>' : '<span class="badge bg-warning text-dark">PENDING</span>'}</td><td class="text-center">${isPaid ? `<button onclick="updateTrxStatus('${t.id}', 'pending')" class="btn btn-sm btn-outline-danger">Batalkan</button>` : `<button onclick="updateTrxStatus('${t.id}', 'approved')" class="btn btn-sm btn-success">Approve</button>`}</td></tr>`;
            }).join('');
            document.getElementById('trxTableBody').innerHTML = html || '<tr><td colspan="5" class="text-center p-4">Tidak ada data</td></tr>';
        };

        window.updateTrxStatus = async (id, status) => { await window.supabaseClient.from('transactions').update({ status }).eq('id', id); showToast("Status diubah!"); renderTransactions(document.getElementById('main-content')); };

        const renderCourseDetail = async (container) => {
            // Fetch updated course detail
            const { data: courseData } = await window.supabaseClient.from('courses').select('*').eq('id', state.activeCourse.id).single();
            if(courseData) state.activeCourse = courseData;

            container.innerHTML = `
                <button onclick="navigate('dashboard')" class="btn btn-link text-muted p-0 mb-4"><i class="fa-solid fa-arrow-left me-1"></i> Kembali</button>
                <div class="card bg-dark text-white p-5 mb-4 rounded-4" style="background: linear-gradient(to right, #0f172a, #334155) !important;"><h2 class="fw-bold">${state.activeCourse.title}</h2><p class="mb-0 text-white-50">${state.activeCourse.description}</p></div>
                <ul class="nav nav-tabs mb-4"><li class="nav-item"><button class="nav-link ${state.activeTab === 'materi' ? 'active' : ''}" onclick="switchTab('materi')"><i class="fa-solid fa-book me-2"></i>Materi & Tugas</button></li><li class="nav-item"><button class="nav-link ${state.activeTab === 'tugas' ? 'active' : ''}" onclick="switchTab('tugas')"><i class="fa-solid fa-inbox me-2"></i>Pantau Tugas</button></li><li class="nav-item"><button class="nav-link ${state.activeTab === 'kuis' ? 'active' : ''}" onclick="switchTab('kuis')"><i class="fa-solid fa-list-check me-2"></i>Kelola Kuis</button></li><li class="nav-item"><button class="nav-link ${state.activeTab === 'progress' ? 'active' : ''}" onclick="switchTab('progress')"><i class="fa-solid fa-chart-line me-2"></i>Pantau Progress</button></li></ul>
                <div id="tabContent"></div>`;
            loadTabContent();
        };

        window.switchTab = (tabName) => { state.activeTab = tabName; renderCourseDetail(document.getElementById('main-content')); };

        const loadTabContent = async () => {
            const content = document.getElementById('tabContent');

            if (state.activeTab === 'materi') {
                const { data: materialsData } = await window.supabaseClient.from('materials').select('*').eq('course_id', state.activeCourse.id).order('order_number', { ascending: true });
                let materials = materialsData || [];

                let html = `
                    <div class="card p-4 mb-4 border border-primary border-opacity-25 bg-white"><h5 class="fw-bold mb-3">Tambah Materi / Tugas Baru</h5>
                        <form id="formAddMaterial">
                            <div class="row g-3 mb-3"><div class="col-md-9"><input type="text" id="matTitle" class="form-control" placeholder="Judul Materi" required></div><div class="col-md-3"><input type="number" id="matOrder" class="form-control" placeholder="Urutan" value="${materials.length + 1}" required></div></div>
                            <div class="mb-3"><label class="form-label small fw-bold">Isi Materi (Rich Text)</label>
                                <div id="matDescEditor" class="bg-white rounded"></div>
                            </div>
                            <div class="mb-3"><label class="form-label small text-muted">Instruksi Tugas (Opsional)</label><textarea id="matUrl" class="form-control" placeholder="Kosongkan jika tidak perlu kumpul tugas." rows="2"></textarea></div><div class="mb-3"><label class="form-label small text-muted">Kode Iframe (Opsional)</label><textarea id="matEmbed" class="form-control" placeholder="Paste kode <iframe>..." rows="2"></textarea></div><button type="submit" id="btnMat" class="btn btn-primary"><i class="fa-solid fa-save me-2"></i> Simpan Materi</button>
                        </form>
                    </div><div class="d-flex flex-column gap-3">`;

                if (materials.length === 0) { html += `<div class="text-center text-muted p-5 bg-white rounded border">Belum ada materi.</div>`; } 
                else {
                    materials.forEach((mat, idx) => {
                        const matStr = JSON.stringify(mat).replace(/"/g, '&quot;');
                        let embedPreview = mat.embed_code ? `<div class="mt-3 ratio ratio-16x9 bg-light rounded overflow-hidden">${mat.embed_code}</div>` : '';
                        html += `<div class="card shadow-sm"><div class="card-body"><div class="d-flex flex-column flex-md-row gap-3"><div class="bg-primary bg-opacity-10 text-primary fw-bold rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 50px; height: 50px; font-size: 1.2rem;">${mat.order_number || idx + 1}</div><div class="flex-grow-1"><h5 class="fw-bold mb-2">${mat.title} ${mat.content_url ? '<span class="badge bg-warning text-dark ms-2"><i class="fa-solid fa-file-arrow-up"></i> Ada Tugas</span>' : ''}</h5><div class="text-muted small border p-3 rounded bg-light mb-0" style="max-height: 150px; overflow-y:auto;">${mat.description}</div></div><div class="d-flex gap-2 w-100 w-md-auto mt-3 mt-md-0 align-items-start"><button onclick="openEditModal(${matStr})" class="btn btn-warning text-white"><i class="fa-solid fa-pen"></i></button><button onclick="deleteMaterial('${mat.id}')" class="btn btn-danger"><i class="fa-solid fa-trash"></i></button></div></div>${embedPreview}</div></div>`;
                    });
                }
                html += `</div>`; content.innerHTML = html;

                // Inisialisasi Quill Editor untuk Tambah Materi
                const quillAdd = new Quill('#matDescEditor', {
                    theme: 'snow',
                    modules: { toolbar: [['bold', 'italic', 'underline', 'strike'], ['blockquote'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], [{ 'color': [] }], ['image', 'link']] }
                });

                document.getElementById('formAddMaterial').addEventListener('submit', async (e) => {
                    e.preventDefault(); const btn = document.getElementById('btnMat'); btn.disabled = true; btn.innerHTML = 'Menyimpan...';
                    const payload = { course_id: state.activeCourse.id, title: document.getElementById('matTitle').value, description: quillAdd.root.innerHTML, content_url: document.getElementById('matUrl').value, order_number: parseInt(document.getElementById('matOrder').value), embed_code: document.getElementById('matEmbed').value };
                    try { await window.supabaseClient.from('materials').insert([payload]); showToast("Materi ditambah!"); loadTabContent(); } catch (err) { Swal.fire('Gagal', err.message, 'error'); btn.disabled = false; btn.innerHTML = 'Simpan Materi'; }
                });
            } 
            else if (state.activeTab === 'tugas') {
                const { data: subData } = await window.supabaseClient.from('submissions').select('*').eq('course_id', state.activeCourse.id);
                const { data: usersData } = await window.supabaseClient.from('users').select('id, full_name');
                const { data: materialsData } = await window.supabaseClient.from('materials').select('id, title');
                
                let html = `<div class="card border-0 shadow-sm overflow-hidden mb-4"><div class="card-header bg-white p-4 border-bottom"><h5 class="fw-bold mb-0">Tugas Masuk</h5></div><div class="table-responsive"><table class="table table-hover align-middle mb-0"><thead class="table-light text-muted small"><tr><th class="ps-4 py-3">Nama Siswa</th><th class="py-3">Materi Tugas</th><th class="py-3 text-center">File</th><th class="py-3 text-center">Nilai</th><th class="pe-4 py-3 text-center">Aksi</th></tr></thead><tbody>`;
                if (!subData || subData.length === 0) { html += `<tr><td colSpan="5" class="text-center p-5 text-muted">Belum ada tugas masuk.</td></tr>`; } 
                else {
                    subData.forEach(sub => {
                        let scoreBadge = sub.score !== null ? `<span class="badge bg-success bg-opacity-10 text-success px-3 py-2">${sub.score} / 100</span>` : `<span class="badge bg-warning bg-opacity-10 text-warning px-3 py-2">Belum Dinilai</span>`;
                        let studentName = usersData?.find(u => u.id === sub.student_id)?.full_name || 'Siswa'; 
                        let materialTitle = materialsData?.find(m => m.id === sub.material_id)?.title || 'Materi';
                        html += `<tr><td class="ps-4 py-3 fw-semibold text-dark">${studentName}</td><td class="py-3"><span class="small text-muted">${materialTitle}</span></td><td class="py-3 text-center"><a href="${sub.file_url}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill"><i class="fa-solid fa-link me-1"></i> Buka</a></td><td class="py-3 text-center">${scoreBadge}</td><td class="pe-4 py-3 text-center"><button onclick="gradeSubmission('${sub.id}', '${studentName}')" class="btn btn-sm btn-success">Beri Nilai</button></td></tr>`;
                    });
                }
                content.innerHTML = html + `</tbody></table></div></div>`;
            } 
            else if (state.activeTab === 'kuis') {
                const { data: quizzesData } = await window.supabaseClient.from('quizzes').select('*').eq('course_id', state.activeCourse.id);
                const quizzes = quizzesData || [];
                let html = `
                    <div class="row mb-4">
                        <div class="col-md-5">
                            <div class="card p-4 bg-white border-0 shadow-sm h-100">
                                <h6 class="fw-bold"><i class="fa-regular fa-clock me-2 text-primary"></i>Pengaturan Waktu Ujian</h6>
                                <p class="small text-muted mb-3">Waktu mundur akan berjalan otomatis untuk siswa. (Default: 15 Menit).</p>
                                <div class="input-group">
                                    <input type="number" id="quizDurationInput" class="form-control" value="${state.activeCourse.quiz_duration || 15}" min="1">
                                    <span class="input-group-text bg-light">Menit</span>
                                    <button class="btn btn-primary" onclick="saveQuizDuration()"><i class="fa-solid fa-save"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card p-4 mb-4 border border-info border-opacity-25 bg-white"><h5 class="fw-bold mb-1">Tambah Soal Kuis</h5><form id="formAddQuiz"><div class="mb-3"><textarea id="qQuestion" class="form-control" placeholder="Pertanyaan..." required></textarea></div><div class="row g-3 mb-3"><div class="col-md-6"><div class="input-group"><span class="input-group-text fw-bold">A</span><input type="text" id="qA" class="form-control" required></div></div><div class="col-md-6"><div class="input-group"><span class="input-group-text fw-bold">B</span><input type="text" id="qB" class="form-control" required></div></div><div class="col-md-6"><div class="input-group"><span class="input-group-text fw-bold">C</span><input type="text" id="qC" class="form-control" required></div></div><div class="col-md-6"><div class="input-group"><span class="input-group-text fw-bold">D</span><input type="text" id="qD" class="form-control" required></div></div></div><div class="mb-3"><select id="qCorrect" class="form-select" required><option value="" disabled selected>-- Pilih Kunci Jawaban --</option><option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option></select></div><button type="submit" id="btnQuiz" class="btn btn-info text-white">Tambahkan Soal</button></form></div><h5 class="fw-bold mb-3 mt-4">Daftar Soal Kuis (${quizzes.length})</h5><div class="d-flex flex-column gap-3">`;
                
                quizzes.forEach((q, idx) => { html += `<div class="card shadow-sm"><div class="card-body"><div class="d-flex justify-content-between mb-3"><h6 class="fw-bold mb-0"><span class="badge bg-secondary me-2">Soal ${idx + 1}</span> ${q.question}</h6><button onclick="deleteQuiz('${q.id}')" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button></div><div class="row g-2 small"><div class="col-md-6"><div class="p-2 border rounded ${q.correct === 'a' ? 'bg-success bg-opacity-10 border-success fw-bold' : 'bg-light'}">A. ${q.a}</div></div><div class="col-md-6"><div class="p-2 border rounded ${q.correct === 'b' ? 'bg-success bg-opacity-10 border-success fw-bold' : 'bg-light'}">B. ${q.b}</div></div><div class="col-md-6"><div class="p-2 border rounded ${q.correct === 'c' ? 'bg-success bg-opacity-10 border-success fw-bold' : 'bg-light'}">C. ${q.c}</div></div><div class="col-md-6"><div class="p-2 border rounded ${q.correct === 'd' ? 'bg-success bg-opacity-10 border-success fw-bold' : 'bg-light'}">D. ${q.d}</div></div></div></div></div>`; });
                content.innerHTML = html + `</div>`;

                document.getElementById('formAddQuiz').addEventListener('submit', async (e) => {
                    e.preventDefault(); 
                    const payload = { course_id: state.activeCourse.id, question: document.getElementById('qQuestion').value, a: document.getElementById('qA').value, b: document.getElementById('qB').value, c: document.getElementById('qC').value, d: document.getElementById('qD').value, correct: document.getElementById('qCorrect').value };
                    await window.supabaseClient.from('quizzes').insert([payload]); showToast("Soal ditambahkan!"); loadTabContent(); 
                });
            } 
            else if (state.activeTab === 'progress') {
                content.innerHTML = `<div class="text-center p-5"><div class="spinner-border text-primary"></div></div>`;
                const { data: trxData } = await window.supabaseClient.from('transactions').select('*').eq('course_id', state.activeCourse.id);
                const { data: usersData } = await window.supabaseClient.from('users').select('id, full_name, nisn');
                let students = usersData?.filter(u => trxData?.some(t => t.student_id === u.id && (t.status === 'PAID' || t.status === 'approved'))) || [];
                
                const { data: materialsData } = await window.supabaseClient.from('materials').select('id').eq('course_id', state.activeCourse.id);
                const matIds = materialsData?.map(m => m.id) || [];
                const { data: pData } = matIds.length > 0 ? await window.supabaseClient.from('progress').select('*').in('material_id', matIds) : {data:[]};
                const { data: scoresData } = await window.supabaseClient.from('quiz_scores').select('*').eq('course_id', state.activeCourse.id);

                let html = `<div class="card border-0 shadow-sm overflow-hidden"><div class="card-header bg-white p-4 d-flex justify-content-between border-bottom"><h5 class="fw-bold mb-0">Laporan Siswa</h5><button onclick="exportToPDF()" class="btn btn-danger btn-sm"><i class="fa-solid fa-file-pdf"></i> Cetak PDF</button></div><div class="table-responsive"><table class="table align-middle" id="progressTable"><thead class="table-light small"><tr><th class="ps-4">Siswa</th><th>Materi Selesai</th><th class="text-center">Nilai Kuis</th><th class="pe-4 text-center">Status</th></tr></thead><tbody>`;
                
                if (students.length === 0) { html += `<tr><td colSpan="4" class="text-center p-4">Belum ada siswa.</td></tr>`; } 
                else {
                    students.forEach(student => {
                        const compCount = pData?.filter(p => p.student_id === student.id).length || 0;
                        const perc = matIds.length === 0 ? 0 : Math.round((compCount / matIds.length) * 100);
                        const sScore = scoresData?.filter(s => s.student_id === student.id).map(s=>s.score) || [];
                        const best = sScore.length > 0 ? Math.max(...sScore) : 0;
                        const isLulus = (perc === 100 && matIds.length > 0) && best >= 80;

                        html += `<tr><td class="ps-4 fw-semibold">${student.full_name}<br><small class="text-muted fw-normal">${student.nisn}</small></td><td><div class="progress mb-1" style="height:6px;"><div class="progress-bar bg-success" style="width: ${perc}%"></div></div><small>${perc}% (${compCount}/${matIds.length})</small></td><td class="text-center fw-bold">${sScore.length>0 ? best : '-'}</td><td class="pe-4 text-center">${isLulus ? `<span class="badge bg-success">LULUS</span>` : `<span class="badge bg-warning">BELUM</span>`}</td></tr>`;
                    });
                }
                content.innerHTML = html + `</tbody></table></div></div>`;
            }
        };

        window.saveQuizDuration = async () => {
            const val = document.getElementById('quizDurationInput').value;
            Swal.showLoading();
            try {
                const { error } = await window.supabaseClient.from('courses').update({ quiz_duration: parseInt(val) }).eq('id', state.activeCourse.id);
                if(error) throw error;
                state.activeCourse.quiz_duration = parseInt(val);
                showToast("Waktu Ujian Diperbarui!");
            } catch (err) { Swal.fire('Gagal', 'Pastikan Anda sudah membuat kolom quiz_duration (int4) di tabel courses pada Supabase!', 'error'); }
        };

        window.openEditModal = (mat) => {
            Swal.fire({ 
                title: 'Edit Materi', width: '700px',
                html: `<div class="text-start"><div class="mb-3"><label class="small fw-bold">Judul</label><input type="text" id="editTitle" class="form-control" value="${mat.title}"></div><div class="mb-3"><label class="small fw-bold">Urutan</label><input type="number" id="editOrder" class="form-control" value="${mat.order_number}"></div><div class="mb-3"><label class="small fw-bold">Isi Materi</label><div id="editDescEditor" class="bg-white"></div></div><div class="mb-3"><label class="small fw-bold text-primary">Instruksi Tugas</label><textarea id="editUrl" class="form-control">${mat.content_url || ''}</textarea></div></div>`, 
                showCancelButton: true, confirmButtonText: 'Simpan',
                didOpen: () => {
                    // Inisialisasi Quill di dalam Pop-up Edit
                    window.quillEdit = new Quill('#editDescEditor', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image', 'link']] } });
                    window.quillEdit.root.innerHTML = mat.description;
                },
                preConfirm: () => { return { id: mat.id, title: document.getElementById('editTitle').value, order_number: parseInt(document.getElementById('editOrder').value), description: window.quillEdit.root.innerHTML, content_url: document.getElementById('editUrl').value } }
            }).then(async (result) => {
                if (result.isConfirmed) { await window.supabaseClient.from('materials').update({ title: result.value.title, order_number: result.value.order_number, description: result.value.description, content_url: result.value.content_url }).eq('id', result.value.id); showToast("Materi diperbarui"); loadTabContent(); }
            });
        };

        window.gradeSubmission = (id, sName) => { Swal.fire({ title: 'Beri Nilai', html: `<p class="mb-3">Nilai untuk <b>${sName}</b></p><input type="number" id="gradeScore" class="form-control text-center fs-4 fw-bold">`, showCancelButton: true, confirmButtonText: 'Simpan', preConfirm: () => parseInt(document.getElementById('gradeScore').value) }).then(async (res) => { if (res.isConfirmed) { await window.supabaseClient.from('submissions').update({ score: res.value }).eq('id', id); showToast('Nilai disimpan!'); loadTabContent(); } }); };
        window.deleteMaterial = (id) => { Swal.fire({ title: 'Hapus?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', confirmButtonColor: '#d33' }).then(async (res) => { if (res.isConfirmed) { await window.supabaseClient.from('materials').delete().eq('id', id); showToast("Terhapus"); loadTabContent(); } }); };
        window.deleteQuiz = (id) => { Swal.fire({ title: 'Hapus Soal?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', confirmButtonColor: '#d33' }).then(async (res) => { if (res.isConfirmed) { await window.supabaseClient.from('quizzes').delete().eq('id', id); showToast("Terhapus"); loadTabContent(); } }); };
        window.exportToPDF = () => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.text('LAPORAN NILAI SISWA', 14, 20); doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.text(`Kelas : ${state.activeCourse.title}`, 14, 28); doc.autoTable({ html: '#progressTable', startY: 35, theme: 'grid', headStyles: { fillColor: [14, 165, 233] } }); doc.save(`Laporan_${state.activeCourse.title}.pdf`); };

        renderApp();
    </script>
</body>
</html>
